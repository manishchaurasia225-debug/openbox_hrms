spring:
  application:
    name: hrms

  # Default profile used when none is supplied. Override at runtime with
  # SPRING_PROFILES_ACTIVE=prod  (or --spring.profiles.active=prod).
  profiles:
    default: dev

  # All authentication is JWT (API chain) with the database as the user store (AuthService); there
  # is no form-login user store. Exclude the default UserDetailsService auto-config so Spring does
  # not create a throwaway in-memory "user" with a random password printed to the logs on startup.
  autoconfigure:
    exclude:
      - org.springframework.boot.security.autoconfigure.UserDetailsServiceAutoConfiguration

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/hrms}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:root}
    driver-class-name: org.postgresql.Driver

  jpa:
    # Disable Open-Session-In-View: enforce explicit transaction boundaries.
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      max-file-size: ${HRMS_MAX_FILE_SIZE:10MB}
      max-request-size: ${HRMS_MAX_REQUEST_SIZE:12MB}

server:
  port: ${SERVER_PORT:8080}

# Actuator: expose health + info for readiness/liveness checks and dev verification.
management:
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS:health,info}
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true

# OpenAPI / Swagger UI paths (served by springdoc; permitted in SecurityConfig).
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

# HRMS application settings. Secrets come from the environment (never hardcoded); see decisions.md D-002.
hrms:
  storage:
    # Local filesystem base path for document binaries (S3 backend pluggable later, D-004 style).
    base-path: ${HRMS_STORAGE_PATH:storage/documents}
    max-file-size-bytes: ${HRMS_STORAGE_MAX_BYTES:10485760}
  app:
    # Base URL used to build password-reset / email-verification links in outgoing emails.
    base-url: ${HRMS_APP_BASE_URL:http://localhost:8080}
  mail:
    from: ${HRMS_MAIL_FROM:no-reply@ogm-hrms.local}
  security:
    tokens:
      password-reset-ttl: ${HRMS_PASSWORD_RESET_TTL:PT30M}
      email-verification-ttl: ${HRMS_EMAIL_VERIFICATION_TTL:P1D}
    jwt:
      # A strong (>= 32-byte) secret is REQUIRED. Provided per environment via HRMS_JWT_SECRET.
      secret: ${HRMS_JWT_SECRET:}
      access-token-ttl: ${HRMS_JWT_ACCESS_TTL:PT15M}
      refresh-token-ttl: ${HRMS_JWT_REFRESH_TTL:P7D}
      issuer: ogm-hrms
    lockout:
      max-failed-attempts: ${HRMS_LOCKOUT_MAX_ATTEMPTS:5}
      lock-duration: ${HRMS_LOCKOUT_DURATION:PT15M}
    cors:
      # Comma-separated browser origins allowed to call /api/**. Empty = no cross-origin access
      # (safe default). Set per environment (e.g. the SPA host). Never combine "*" with credentials.
      allowed-origins: ${HRMS_CORS_ALLOWED_ORIGINS:}
      allow-credentials: ${HRMS_CORS_ALLOW_CREDENTIALS:false}
  bootstrap:
    super-admin:
      # Optional first-boot Super Admin. Set both to seed one; otherwise no admin is created.
      email: ${SUPER_ADMIN_EMAIL:}
      password: ${SUPER_ADMIN_PASSWORD:}
      full-name: ${SUPER_ADMIN_FULL_NAME:System Administrator}
